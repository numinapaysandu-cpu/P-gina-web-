<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÜMIA | Ropa Interior</title>
    <style>
        /* Estilos básicos para que se vea bien en el celu */
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 80%; border-radius: 10px; }
        .product-card { border: 1px solid #ddd; margin: 10px; padding: 10px; border-radius: 8px; }
        .buy-btn { background: #25d366; color: white; padding: 10px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>NÜMIA</h1>
        <p>Prendas de vestir</p>
    </header>

    <button onclick="openModal('modal-catalogo')">Ver Catálogo</button>

    <div id="modal-catalogo" class="modal">
        <div class="modal-content">
            <span onclick="closeModal('modal-catalogo')" style="float:right; cursor:pointer;">&times;</span>
            <h2>Catálogo</h2>
            <div class="products-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

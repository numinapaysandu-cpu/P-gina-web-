<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Numia</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        h2 { border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>Catálogo Numia</h1>
    <div id="catalog"></div>
</div>

<script>
    // Tu base de datos actualizada
    const backupCatalogData = {
        conjuntos: [
            { id: "co1", name: "Conjunto de encaje con bralette", desc: "Talle: M<br>Colores: Morado y beige", price: 250, img: "images/30060.jpg" },
            { id: "co2", name: "Conjunto de encaje con bralette", desc: "Talle: M<br>Colores: Morado y beige", price: 250, img: "images/30061.jpg" },
            { id: "co3", name: "Conjunto de encaje con bralette", desc: "Talle: M<br>Colores: Morado y beige", price: 250, img: "images/30062.jpg" }
        ],
        bombachas: [
            { id: "bo1", name: "Less de encaje", desc: "Talles: M - XL<br>Colores: Negro, Rosa viejo, Azul, Gris, Bordó, Blanco", price: 120, img: "images/30066.jpg" },
            { id: "bo2", name: "Less de encaje", desc: "Talles: M - XL<br>Colores: Negro, Rosa viejo, Azul, Gris, Bordó, Blanco", price: 120, img: "images/30067.jpg" },
            { id: "bo3", name: "Less lisa 100% algodón", desc: "Talles: M al XL", price: 100, img: "images/30068.jpg" },
            { id: "bo4", name: "Bikinis de algodón con puntilla", desc: "Talles: M al XL<br>Colores: Blanco, Negro, Lila, Fucsia, Celeste, Verde agua, Beige", price: 130, img: "images/bikini.jpg" }
        ],
        medias: [
            { id: "me1", name: "Medias infantiles", desc: "Varios motivos<br>Pack: 3 pares por $100", price: 100, img: "89b519b9e8134dd884570cd0646ff405_2.png" },
            { id: "me2", name: "Medias gruesas", desc: "Varios colores<br>Pack: 3 pares por $170", price: 170, img: "Gemini_Generated_Image_br1myfbr1myfbr1m.png" },
            { id: "me3", name: "Medias capibara", desc: "Varios diseños<br>Precio por par: $50", price: 50, img: "Gemini_Generated_Image_h2i9j5h2i9j5h2i9.png" },
            { id: "me4", name: "Zoquetes comunes", desc: "Varios colores<br>Precio por par: $50", price: 50, img: "Gemini_Generated_Image_r4mp9hr4mp9hr4mp.png" },
            { id: "me5", name: "Medias gruesas individuales", desc: "Varios colores<br>Precio por par: $60", price: 60, img: "Medias gruesas individuales.png" }
        ]
    };

    // Lógica para renderizar el catálogo
    const catalogContainer = document.getElementById('catalog');

    for (const category in backupCatalogData) {
        const section = document.createElement('section');
        section.innerHTML = `<h2>${category.toUpperCase()}</h2><div class="product-grid" id="${category}"></div>`;
        catalogContainer.appendChild(section);

        const grid = document.getElementById(category);
        backupCatalogData[category].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <h3>${item.name}</h3>
                <p>${item.desc}</p>
                <p><strong>$${item.price}</strong></p>
            `;
            grid.appendChild(card);
        });
    }
</script>

</body>
</html>
